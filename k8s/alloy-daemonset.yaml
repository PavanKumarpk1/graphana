apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: kube-system
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    // Discovery component to look for container logs on the host node
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Read and parse logs from local container runtimes
    loki.source.kubernetes "pod_logs" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    // Ship logs directly to your Grafana Cloud instance
    loki.write "grafana_cloud" {
      endpoint {
        url = sys.env("GRAFANA_LOKI_URL")
        basic_auth {
          username = sys.env("GRAFANA_USER_ID")
          password = sys.env("GRAFANA_API_KEY")
        }
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: grafana-alloy
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: grafana-alloy
  template:
    metadata:
      labels:
        name: grafana-alloy
    spec:
      tolerations:
      - effect: NoSchedule
        operator: Exists
      containers:
      - name: alloy
        image: grafana/alloy:v1.1.1
        args: ["run", "/etc/alloy/config.alloy", "--storage.path=/tmp/alloy-data"]
        env:
        # Securely input these environment configurations or tie them to K8s Secrets
        - name: GRAFANA_LOKI_URL
          value: "https://logs-prod-XXXX.grafana.net/loki/api/v1/push"
        - name: GRAFANA_USER_ID
          value: "YOUR_GRAFANA_USER_ID"
        - name: GRAFANA_API_KEY
          value: "YOUR_GRAFANA_CLOUD_API_TOKEN"
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        ports:
        - containerPort: 12345
          name: http-metrics
      volumes:
      - name: config
        configMap:
          name: alloy-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers