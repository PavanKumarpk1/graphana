apiVersion: v1
kind: Namespace
metadata:
  name: jenkins
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-home-pvc
  namespace: jenkins
spec:
  accessModes:
    - ReadWriteOnce 
  resources:
    requests:
      storage: 20Gi 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins-server
spec:
  replicas: 1 
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: jenkins-server
  template:
    metadata:
      labels:
        app: jenkins-server
    spec:
      securityContext:
        fsGroup: 1000 
      containers:
      - name: jenkins
        # 1. Switched to the absolute standard official stable image
        image: jenkins/jenkins:lts
        securityContext:
          runAsUser: 0  # 2. Runs as root so it has permissions to talk to the docker socket
        ports:
        - containerPort: 8080
          name: http-port
        - containerPort: 50000
          name: agent-port
        env:
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=true"
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "512Mi"
        volumeMounts:
        - name: jenkins-storage
          mountPath: /var/jenkins_home 
        - name: docker-sock
          mountPath: /var/run/docker.sock 
      volumes:
      - name: jenkins-storage
        persistentVolumeClaim:
          claimName: jenkins-home-pvc
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock