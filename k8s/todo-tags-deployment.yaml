apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-tags-api
  labels:
    app: todo-tags-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-tags-api
  template:
    metadata:
      labels:
        app: todo-tags-api
    spec:
      nodeSelector:
        nodeName: gke-todo-microservic-todo-secondary-p-801ea2db-rpvs # Schedules exclusively on Node Pool 2
      containers:
      - name: todo-tags-api
        image: gcr.io/YOUR_GCP_PROJECT_ID/todo-tags-api:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "250Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: todo-tags-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: todo-tags-api